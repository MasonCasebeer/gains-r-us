<!DOCTYPE html>

<html lang="en">
    
<head> 
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/admin.css">
    <title> Gains R Us </title>    
</head>

<body data-page="admin">
    <nav class="navbar">
        <H1> SECRET ADMIN PORTAL </H1>
        <ul class="nav-links">
            <a href="/index.html"> Home </a>
        </ul>
    </nav>
    <div id = "control-panel">
        <h2> Dashboard Control </h2>
        <fieldset id = "dashboard-controls">
            
            <button id="display"> Display Users and Workouts </button>
            <br>

            <div id="display-area"></div>
            <fieldset>
                <label for="user">Userid:</label> 
                <input type="text" id="user" name="username" required class="log-input">
                <button id="add-workout">Add Workout for User</button>
                <button id="exit-add">Exit</button>
                <div class ="log" style="display: none;">
                    <script type="module" src = 'script/log.js?v=2'></script>
                </div>
            </fieldset>
            <fieldset>
                <!-- <input type="text" id="create-routine" name="username" required class="log-input"> -->
                <button id="submit-routine">Submit Routine</button>
                <button id="add-exercise">Add Exercise</button>
                <input id="routine-name" type="text" placeholder="Routine Name">
                <input id="routine-type" type="text" placeholder="Routine Type">
                <input id="routine-user" type="number" placeholder="User-id">
                <form id= "routine-form"></form>
                <button id="restart-create">Restart</button>
                <script type = "module" src = 'script/createRoutine.js'></script>
            </fieldset>
            
            <br>
        </fieldset>
    </div>
    <script type="module"src = "script/controlPanel.js"></script>
</body>
