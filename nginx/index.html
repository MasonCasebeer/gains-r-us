<!DOCTYPE html>

<html lang="en">
    
<head> 
    <link rel="stylesheet" href="/index.css">
    <title> Gains R Us </title>    
</head>
<body>
    <nav class="navbar">
        <H1> Gains R Us </H1>
        <ul class="nav-links">
            <a href="/index.html"> Home </a>
            <div id="user-status">Checking login status...</div>
            <div id="admin-link"></div>
        </ul>
    </nav>


    <div class="main-content">
        <div class="sidebar">
            <div class="calendar-container">
                <header class="calendar-header">
                    <p class="calendar-current-date"></p>
                    <div class="calendar-navigation">
                        <span id="calendar-prev" class="material-symbols-rounded">
                            <
                        </span>
                        <span id="calendar-next" class="material-symbols-rounded">
                            >
                        </span>
                    </div>
                </header>

                <div class="calendar-body">
                    <ul class="calendar-weekdays">
                        <li>Sun</li>
                        <li>Mon</li>
                        <li>Tue</li>
                        <li>Wed</li>
                        <li>Thu</li>
                        <li>Fri</li>
                        <li>Sat</li>
                    </ul>
                    <ul class="calendar-dates"></ul>
                </div>
            </div>
        </div>

        <div class = "daily">
            <div class ="log">
                <script src = 'script/log.js'></script>
            </div>
            <div class ="body">
                <script src = 'script/body.js'></script>
            </div>
        </div>

    </div>

    <div id="bottom-content">
        Gains R Us is a joint collaboration of Casebeer, Witte, Wheeler
    </div>

    <script src="script/calendar.js"></script>
    <script defer src="script/loginStatus.js"></script>
    <script defer src="script/adminPage.js"></script>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form id="loginForm" method="POST">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <br><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <br><br>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
